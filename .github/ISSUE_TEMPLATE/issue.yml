name: AgentForge
description: File a bug report or feature request for AgentForge
body:
  - type: markdown
    attributes:
      value: "Thank you for taking the time to fill out this issue report. Please include enough context for the issue to be reproduced or understood."
  - type: checkboxes
    id: project-related-confirmation
    attributes:
      label: 'Make sure the issue is related to AgentForge.'
      description: 'Use this template for bugs, improvements, or feature requests related to this project.'
      options:
        - label: 'I confirm that this issue is related to AgentForge.'
          required: true
  - type: textarea
    id: issue-description
    attributes:
      label: 'Description of the bug or feature request'
      description: 'Describe the bug, improvement, or feature request. Add logs, context, screenshots, or reproduction steps when useful.'
